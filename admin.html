            function attachAdminHealthPing() {
                var btn = document.getElementById('adminRunHealthPing');
                var statusEl = document.getElementById('adminRunHealthPingStatus');
                if (!btn) return;
                btn.addEventListener('click', function() {
                    if (!window.supabaseClient) {
                        alert('Supabase not connected.');
                        return;
                    }
                    btn.disabled = true;
                    if (statusEl) statusEl.textContent = 'Pinging…';
                    window.supabaseClient.auth.getSession().then(function(sessionRes) {
                        var session = sessionRes && sessionRes.data && sessionRes.data.session;
                        var token = session && session.access_token;
                        if (!token) {
                            btn.disabled = false;
                            if (statusEl) statusEl.textContent = '';
                            alert('Sign in on this page first (same session as admin).');
                            return null;
                        }
                        return fetch('/api/admin-ping-health', {
                            method: 'POST',
                            headers: {
                                'Authorization': 'Bearer ' + token,
                                'Content-Type': 'application/json'
                            }
                        }).then(function(r) {
                            return r.json().then(function(body) {
                                return { ok: r.ok, status: r.status, body: body };
                            });
                        });
                    }).then(function(result) {
                        if (!result) return;
                        btn.disabled = false;
                        if (result.ok && result.body && result.body.ok) {
                            if (statusEl) statusEl.textContent = 'Updated.';
                            loadDashboard();
                            return;
                        }
                        var msg = (result.body && result.body.error) ? result.body.error : ('HTTP ' + result.status);
                        if (statusEl) statusEl.textContent = '';
                        if (result.status === 404) {
                            alert('API not available on this host. Deploy on Vercel or run npm run dev:vercel for local API.');
                        } else {
                            alert('Ping failed: ' + msg);
                        }
                    }).catch(function(err) {
                        btn.disabled = false;
                        if (statusEl) statusEl.textContent = '';
                        alert('Ping failed: ' + (err && err.message ? err.message : String(err)));
                    });
                });
            }

                    var badgeClass = groups === 0 ? 'group-badge zero' : 'group-badge';
                    th += '<tr class="' + rowClass + '" data-user-index="' + i + '">';
                    th += '<td><div class="user-cell"><div class="user-avatar ' + avClass + '">' + escapeHtml(avLetter) + '</div><div><div class="user-info-primary">' + escapeHtml(id) + '</div><div class="user-info-secondary">' + escapeHtml(name) + '</div></div></div></td>';
                    th += '<td><span class="date-text">' + formatDateShort(created) + '</span></td>';
                    th += '<td><span class="' + badgeClass + '">' + groups + '</span></td>';
                    th += '</tr>';
                    if (expandedIndex === i) {
                        var groupNames = u.groupNames || [];
                        var trashSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>';
                        var groupsHtml = groupNames.length === 0
                            ? '<span class="groups-empty">No groups yet</span>'
                            : '<ul class="groups-list">' + groupNames.map(function(n) { return '<li>' + escapeHtml(n) + '</li>'; }).join('') + '</ul>';
                        th += '<tr class="expand-row"><td colspan="3" class="expand-cell">';
                        th += '<div class="inner"><div class="expand-panel-accent"></div><div class="expand-panel-body">';
                        th += '<div class="expand-detail-left"><p class="expand-panel-label">Groups</p>' + groupsHtml + '</div>';
                        th += '<div class="expand-panel-right"><div class="expand-panel-meta">Member since ' + formatDateShort(created) + '</div>';
                        th += '<div class="expand-actions"><button type="button" class="btn-delete-user" data-user-index="' + i + '" title="Delete user" aria-label="Delete user">' + trashSvg + ' Delete user</button></div>';
                        th += '</div></div></div></td></tr>';
                    }
                });
                if (users.length === 0) th += '<tr><td colspan="3" class="admin-empty-row"><span class="admin-empty-text">No users yet, or RLS is blocking admin read.</span></td></tr>';
                th += '</tbody></table></div>';

                document.getElementById('adminTableSection').innerHTML = th;

                document.querySelectorAll('.admin-sort-btn').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        currentSort = btn.getAttribute('data-sort');
                        expandedIndex = -1;
                        renderTable(currentStats);
                    });
                });

                document.querySelectorAll('.admin-table tbody tr:not(.expand-row)').forEach(function(el) {
                    if (el.classList.contains('expand-row')) return;
                    el.addEventListener('click', function() {
                        var idx = parseInt(el.getAttribute('data-user-index'), 10);
                        if (isNaN(idx)) return;
                        expandedIndex = expandedIndex === idx ? -1 : idx;
                        renderTable(currentStats); /* only table, charts untouched */
                    });
                });
                document.querySelectorAll('.btn-delete-user').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var idx = parseInt(btn.getAttribute('data-user-index'), 10);
                        var u = currentStats && currentStats.users && currentStats.users[idx];
                        if (!u) {
                            console.warn('[Admin] Delete clicked but no user at index', idx);
                            return;
                        }
                        if (!confirm('Delete user "' + (u.name || u.id) + '"? This removes them from app data (users, groups, expenses). You can remove them from login in Supabase Dashboard → Authentication → Users. This cannot be undone.')) return;
                        var userId = (u.id != null) ? String(u.id) : '';
                        if (!userId) {
                            alert('Cannot delete: no user id.');
                            return;
                        }
                        console.log('[Admin] Delete confirmed for userId:', userId);
                        btn.disabled = true;
                        var deleteFn = typeof window.deleteUserInSupabase === 'function' ? window.deleteUserInSupabase : null;
                        if (!deleteFn) {
                            alert('Delete API not loaded. Check script order.');
                            btn.disabled = false;
                            return;
                        }
                        deleteFn(userId).then(function(result) {
                            btn.disabled = false;
                            if (result.ok) {
                                expandedIndex = -1;
                                content.innerHTML = '<p class="admin-msg">Refreshing list…</p>';
                                loadDashboard();
                            } else {
                                alert('Delete failed: ' + (result.error || 'Unknown error'));
                                if (result.error && result.error.indexOf('Sign in with Supabase') !== -1) showSignInPage();
                            }
                        }).catch(function(err) {
                            btn.disabled = false;
                            alert('Delete failed: ' + (err && err.message ? err.message : String(err)));
                        });
                    });
                });
            }

            /* ---- render: full page (called on initial load or after delete) ---- */
            function render(stats) {
                currentStats = stats;
                content.innerHTML = '<div id="adminHealthSection"></div><div id="adminAnalyticsSection"></div><div id="adminTableSection"></div>';
                renderHealth(stats);
                renderAnalytics(stats);
                renderTable(stats);
            }

            function showSignInPage() {
                hideAdminLoading();
                var linksEl = document.getElementById('adminHeaderLinks');
                if (linksEl) {
                    linksEl.innerHTML = '<a href="index.html" class="back-link">← Back to app</a>';
                }
                content.innerHTML = '<div class="admin-signin-wrap">' +
                    '<div class="admin-signin-card">' +
                    '<h2>Admin sign in</h2>' +
                    '<p class="admin-signin-subtitle">Restricted area. Sign in with your admin credentials to manage users and data.</p>' +
                    '<form id="adminSignInForm">' +
                    '<div class="admin-field">' +
                    '<label for="adminEmail">Email</label>' +
                    '<input type="email" id="adminEmail" class="admin-input" placeholder="you@example.com" autocomplete="email" value="' + escapeHtml(ALLOWED_ADMIN_EMAIL) + '">' +
                    '</div>' +
                    '<div class="admin-field">' +
                    '<label for="adminPassword">Password</label>' +
                    '<div class="admin-password-wrap">' +
                    '<input type="password" id="adminPassword" placeholder="Enter password" autocomplete="current-password">' +
                    '<button type="button" class="admin-toggle-pw" id="adminTogglePw" aria-label="Show password" title="Show password">' +
                    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>' +
                    '</button></div>' +
                    '</div>' +
                    '<button type="submit" class="btn-signin" id="adminSignInBtn">Sign in</button>' +
                    '<p id="adminSignInStatus" class="admin-signin-status"></p>' +
                    '</form></div></div>';
                document.getElementById('adminSignInForm').addEventListener('submit', function(e) {
                    e.preventDefault();
                    var emailEl = document.getElementById('adminEmail');
                    var pwEl = document.getElementById('adminPassword');
                    var statusEl = document.getElementById('adminSignInStatus');
                    var btn = document.getElementById('adminSignInBtn');
                    var email = (emailEl && emailEl.value) ? emailEl.value.trim().toLowerCase() : '';
                    var pw = (pwEl && pwEl.value) ? pwEl.value : '';
                    if (!email) { statusEl.textContent = 'Enter your email.'; statusEl.className = 'admin-signin-status error'; return; }
                    if (!pw) { statusEl.textContent = 'Enter your password.'; statusEl.className = 'admin-signin-status error'; return; }
                    statusEl.textContent = '';
                    statusEl.className = 'admin-signin-status';
                    if (btn) { btn.disabled = true; btn.textContent = 'Signing in…'; }
                    var signIn = typeof window.authSignIn === 'function' ? window.authSignIn : null;
                    if (!signIn) {
                        statusEl.textContent = 'Auth not loaded.';
                        statusEl.className = 'admin-signin-status error';
                        if (btn) { btn.disabled = false; btn.textContent = 'Sign in'; }
                        return;
                    }
                    signIn(email, pw).then(function(res) {
                        if (res && res.error) {
                            statusEl.textContent = res.error.message || 'Sign in failed.';
                            statusEl.className = 'admin-signin-status error';
                            if (btn) { btn.disabled = false; btn.textContent = 'Sign in'; }
                            return;
                        }
                        if (email !== ALLOWED_ADMIN_EMAIL) {
                            statusEl.textContent = 'Only the admin email can access this page.';
                            statusEl.className = 'admin-signin-status error';
                            if (typeof window.authSignOut === 'function') window.authSignOut();
                            if (btn) { btn.disabled = false; btn.textContent = 'Sign in'; }
                            return;
                        }
                        statusEl.textContent = 'Signed in.';
                        statusEl.className = 'admin-signin-status success';
                        showDashboard();
                    }).catch(function(err) {
                        statusEl.textContent = (err && err.message) ? err.message : 'Sign in failed.';
                        statusEl.className = 'admin-signin-status error';
                        if (btn) { btn.disabled = false; btn.textContent = 'Sign in'; }
                    });
                });
                var pwInput = document.getElementById('adminPassword');
                var toggleBtn = document.getElementById('adminTogglePw');
                if (pwInput && toggleBtn) {
                    var eyeSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
                    var eyeOffSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
                    toggleBtn.addEventListener('click', function() {
                        if (pwInput.type === 'password') {
                            pwInput.type = 'text';
                            toggleBtn.innerHTML = eyeOffSvg;
                            toggleBtn.setAttribute('aria-label', 'Hide password');
                            toggleBtn.title = 'Hide password';
                        } else {
                            pwInput.type = 'password';
                            toggleBtn.innerHTML = eyeSvg;
                            toggleBtn.setAttribute('aria-label', 'Show password');
                            toggleBtn.title = 'Show password';
                        }
                    });
                }
            }

            function showDashboard() {
                hideAdminLoading();
                var linksEl = document.getElementById('adminHeaderLinks');
                if (linksEl) {
                    linksEl.innerHTML = '<a href="index.html" class="back-link">← Back to app</a><span class="header-nav-divider"></span><a href="#" id="adminSignOutLink" class="sign-out-link">Sign out</a>';
                    var signOutLink = document.getElementById('adminSignOutLink');
                    if (signOutLink) {
                        signOutLink.addEventListener('click', function(e) {
                            e.preventDefault();
                            if (typeof window.authSignOut === 'function') window.authSignOut();
                            showSignInPage();
                        });
                    }
                }
                loadDashboard();
            }

            function run() {
                if (typeof window.initializeSupabase !== 'function') {
                    hideAdminLoading();
                    content.innerHTML = '<p class="admin-msg admin-error">Supabase not loaded.</p>';
                    return;
                }
                window.initializeSupabase();
                if (typeof window.getAuthSession !== 'function') {
                    showSignInPage();
                    return;
                }
                window.getAuthSession().then(function(s) {
                    var session = s && s.data && s.data.session;
                    var email = session && session.user && session.user.email ? String(session.user.email).toLowerCase().trim() : '';
                    if (session && email === ALLOWED_ADMIN_EMAIL) {
                        showDashboard();
                    } else {
                        showSignInPage();
                    }
                }).catch(function() {
                    showSignInPage();
                });
            }

            function loadDashboard() {
                if (typeof window.fetchAdminStats !== 'function') {
                    content.innerHTML = '<p class="admin-msg admin-error">Admin API not loaded. Check script order.</p>';
                    return;
                }
                window.fetchAdminStats().then(function(stats) {
                    render(stats);
                }).catch(function(err) {
                    content.innerHTML = '<p class="admin-msg admin-error">Failed to load stats: ' + escapeHtml(err && err.message ? err.message : String(err)) + '</p>';
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() { setTimeout(run, 300); });
            } else {
                setTimeout(run, 300);
            }
        })();
    </script>
    <script src="js/footer-component.js"></script>
    <script>
        // Service Worker registration with auto-update detection
        if ('serviceWorker' in navigator) {
            const basePath = window.location.pathname.split('/').slice(0, -1).join('/') || '';
            const swPath = basePath ? `${basePath}/sw.js` : '/sw.js';

            navigator.serviceWorker.register(swPath)
                .then(registration => {
                    // Poll for updates every 30 seconds
                    setInterval(() => { registration.update(); }, 30000);

                    // Auto-reload when a new version is installed
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                if (typeof showNotification === 'function') {
                                    showNotification('App updated! Refreshing...', 'info');
                                }
                                setTimeout(() => { window.location.reload(); }, 2000);
                            }
                        });
                    });
                })
                .catch(() => {});

            navigator.serviceWorker.addEventListener('message', event => {
                if (event.data && event.data.type === 'SW_UPDATED') {
                    if (typeof showNotification === 'function') {
                        showNotification(event.data.message, 'success');
                    }
                }
            });
        }

        window.clearCacheAndUpdate = function() {
            const doReload = () => window.location.reload(true);
            if (!('caches' in window) && !('serviceWorker' in navigator)) { doReload(); return; }
            const unregister = 'serviceWorker' in navigator
                ? navigator.serviceWorker.getRegistrations().then(regs => Promise.all(regs.map(r => r.unregister())))
                : Promise.resolve();
            const clearCaches = 'caches' in window
                ? caches.keys().then(names => Promise.all(names.map(n => caches.delete(n))))
                : Promise.resolve();
            navigator.serviceWorker?.controller?.postMessage({ type: 'CLEAR_CACHE' });
            Promise.all([unregister, clearCaches]).then(() => setTimeout(doReload, 600)).catch(() => setTimeout(doReload, 600));
        };
        window.clearAppCache = function() { window.clearCacheAndUpdate(); };
        window.forceAppUpdate = function() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.ready.then(reg => reg.update().then(() => setTimeout(() => window.location.reload(true), 800)));
            }
        };
    </script>
