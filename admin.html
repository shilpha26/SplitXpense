<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script>
        // Auto-clear cache when someone opens the app (once per session, then reload for latest)
        (function() {
            if (sessionStorage.getItem('splitxpense_cache_cleared')) return;
            if (!('caches' in window) && !('serviceWorker' in navigator)) return;
            sessionStorage.setItem('splitxpense_cache_cleared', '1');
            var unregister = 'serviceWorker' in navigator ? navigator.serviceWorker.getRegistrations().then(function(regs) { return Promise.all(regs.map(function(r) { return r.unregister(); })); }) : Promise.resolve();
            var clearCaches = 'caches' in window ? caches.keys().then(function(names) { return Promise.all(names.map(function(n) { return caches.delete(n); })); }) : Promise.resolve();
            if (navigator.serviceWorker && navigator.serviceWorker.controller) navigator.serviceWorker.controller.postMessage({ type: 'CLEAR_CACHE' });
            Promise.all([unregister, clearCaches]).then(function() { window.location.reload(true); }).catch(function() { window.location.reload(true); });
        })();
    </script>
    <title>Admin - SplitXpense</title>
    <meta name="google-site-verification" content="XeTZ3glRwyC_CHwEdgwa_uc3xJ0wQ8TWbfB-gW1SX7U">
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/logo.png" type="image/png">
    <meta name="theme-color" content="#22c55e">
    <style>
        /* ==========================================================
           SplitXpense Admin — Command Center
           Dark topbar · Colorful stat cards · Avatar rows
           ========================================================== */
        :root {
            --adm-ink:    #0f172a;
            --adm-indigo: #6366f1;
            --adm-amber:  #f59e0b;
        }

        /* ---------- Page shell ---------- */
        .admin-page {
            font-family: var(--font-family);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: #f1f5f9;
        }

        /* ---------- Header ---------- */
        .admin-header {
            height: 64px;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary-600) 0%, var(--primary-700) 100%);
            box-shadow: 0 2px 16px rgba(21, 128, 61, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .admin-header-inner {
            width: 100%;
            padding: 0 var(--space-4);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        @media (min-width: 769px) {
            .admin-header-inner {
                max-width: 1160px;
                margin: 0 auto;
                padding: 0 var(--space-6);
            }
        }
        /* subtle shimmer line at bottom */
        .admin-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.18) 40%, rgba(255,255,255,0.18) 60%, transparent 100%);
        }

        /* Left: brand area */
        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-brand .brand-logo {
            height: 32px;
            width: auto;
            display: block;
            flex-shrink: 0;
        }
        .header-brand-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .header-app-name {
            font-size: var(--text-xl);
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }
        .header-admin-label {
            font-size: 10px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.65);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1;
        }

        /* Right: nav links */
        .admin-header .header-nav {
            display: flex;
            align-items: center;
            gap: var(--space-1);
        }
        .admin-header .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            font-size: var(--text-sm);
            font-weight: 500;
            color: #fff;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.22);
            border-radius: var(--radius-full);
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
            backdrop-filter: blur(4px);
        }
        .admin-header .back-link:hover {
            background: rgba(255,255,255,0.25);
            border-color: rgba(255,255,255,0.35);
        }
        .admin-header .back-link:focus-visible {
            outline: 2px solid rgba(255,255,255,0.6);
            outline-offset: 2px;
        }
        .header-nav-divider {
            width: 1px;
            height: 18px;
            background: rgba(255,255,255,0.2);
            margin: 0 var(--space-1);
            flex-shrink: 0;
        }
        .admin-header #adminHeaderLinks span {
            display: none; /* replaced by .header-nav-divider */
        }
        .admin-header .sign-out-link {
            font-size: var(--text-sm);
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            padding: 7px 10px;
            border-radius: var(--radius-md);
            transition: color 0.2s, background 0.2s;
        }
        .admin-header .sign-out-link:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        /* ---------- Main ---------- */
        .admin-main {
            max-width: 1160px;
            width: 100%;
            margin: 0 auto;
            padding: var(--space-8) var(--space-6);
            flex: 1;
        }
        #adminContent {
            min-width: 0;
        }

        /* ---------- Database keepalive — panel as a single “instrument” module ---------- */
        .admin-health-wrap {
            --health-ink: #0f172a;
            --health-muted: #64748b;
            --health-line: rgba(15, 23, 42, 0.08);
            --health-line-strong: rgba(15, 23, 42, 0.12);
            --health-canvas: #f1f5f9;
            --health-elevated: #ffffff;
            margin-bottom: var(--space-8);
        }
        .admin-health-wrap .admin-section-bar {
            margin-bottom: var(--space-4);
        }
        .admin-health-section-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: var(--space-3);
        }
        .admin-health-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-3);
            flex: 1 1 240px;
            min-width: 0;
        }
        .admin-health-title-row .admin-section-title {
            margin: 0;
            flex: 1 1 auto;
            min-width: 0;
        }
        .admin-health-title-row .admin-health-actions {
            margin-left: 0;
            flex-shrink: 0;
        }
        .admin-health-title-row .admin-health-status-pill {
            flex-shrink: 0;
        }
        .admin-health-status-pill {
            display: inline-flex;
            align-items: center;
            padding: 3px 11px;
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            border: 1px solid transparent;
        }
        .admin-health-status-pill.ok {
            background: rgba(34, 197, 94, 0.12);
            color: #166534;
            border-color: rgba(34, 197, 94, 0.22);
        }
        .admin-health-status-pill.warn {
            background: rgba(245, 158, 11, 0.1);
            color: #a16207;
            border-color: rgba(245, 158, 11, 0.25);
        }
        .admin-health-status-pill.err {
            background: rgba(239, 68, 68, 0.08);
            color: #b91c1c;
            border-color: rgba(239, 68, 68, 0.2);
        }
        .admin-health-actions {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            margin-left: auto;
            flex-wrap: wrap;
        }
        .admin-health-run-btn {
            font-family: var(--font-family);
            font-size: var(--text-xs);
            font-weight: 600;
            padding: 7px 16px;
            border-radius: var(--radius-full);
            border: 1px solid var(--primary-600);
            background: linear-gradient(180deg, var(--primary-600) 0%, var(--primary-700) 100%);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(21, 128, 61, 0.2), 0 2px 8px rgba(21, 128, 61, 0.12);
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s;
        }
        .admin-health-run-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 2px 4px rgba(21, 128, 61, 0.22), 0 4px 12px rgba(21, 128, 61, 0.14);
        }
        .admin-health-run-btn:focus-visible {
            outline: 2px solid var(--primary-400);
            outline-offset: 2px;
        }
        .admin-health-run-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .admin-health-run-status {
            font-size: var(--text-xs);
            color: var(--text-tertiary);
            min-width: 0;
        }
        .admin-health-panel {
            background: var(--health-elevated);
            border-radius: var(--radius-xl);
            border: 1px solid var(--health-line-strong);
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 4px 16px rgba(15, 23, 42, 0.06);
            padding: var(--space-5) var(--space-5);
        }
        .admin-health-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-4);
            padding: var(--space-4);
            background: linear-gradient(165deg, #fafbfc 0%, #f4f7fa 100%);
            border-radius: var(--radius-lg);
            border: 1px solid var(--health-line);
        }
        @media (max-width: 480px) {
            .admin-health-metrics {
                grid-template-columns: 1fr;
            }
        }
        .admin-health-metric-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--health-muted);
            margin-bottom: 6px;
        }
        .admin-health-metric-value {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--health-ink);
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
            line-height: 1.25;
        }
        .admin-health-code {
            margin: var(--space-3) 0 0 0;
            font-size: 11px;
            color: var(--text-secondary);
            font-family: ui-monospace, SFMono-Regular, monospace;
            word-break: break-word;
            line-height: 1.45;
            padding: var(--space-2) var(--space-3);
            background: #f8fafc;
            border-radius: var(--radius-md);
            border: 1px solid var(--health-line);
        }
        .admin-health-cal {
            margin-top: var(--space-5);
            padding: var(--space-4);
            background: var(--health-canvas);
            border-radius: var(--radius-lg);
            border: 1px solid var(--health-line);
        }
        .admin-health-cal-toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: var(--space-2) var(--space-3);
            margin-bottom: var(--space-4);
            padding: var(--space-3) var(--space-3);
            background: var(--health-elevated);
            border-radius: var(--radius-md);
            border: 1px solid var(--health-line);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
        }
        .admin-health-cal-lab {
            font-size: 10px;
            font-weight: 700;
            color: var(--health-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .admin-health-cal-toolbar select {
            font-family: var(--font-family);
            font-size: var(--text-xs);
            font-weight: 500;
            padding: 6px 12px;
            border: 1px solid var(--health-line-strong);
            border-radius: var(--radius-md);
            background: #fafbfc;
            color: var(--health-ink);
            min-width: 0;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .admin-health-cal-toolbar select:focus {
            outline: none;
            border-color: var(--primary-400);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        }
        .admin-health-cal-months {
            display: grid;
            width: 100%;
            gap: var(--space-4) var(--space-6);
            justify-content: center;
            justify-items: center;
        }
        @media (min-width: 769px) {
            .admin-health-cal-months {
                grid-template-columns: repeat(4, max-content);
            }
        }
        .admin-health-cal-month {
            width: max-content;
            padding: var(--space-3);
            background: var(--health-elevated);
            border-radius: 10px;
            border: 1px solid var(--health-line);
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }
        .admin-health-cal-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--health-ink);
            letter-spacing: -0.02em;
            margin: 0 0 10px 0;
        }
        .admin-health-cal-title span {
            font-weight: 500;
            color: var(--health-muted);
            font-size: 10px;
        }
        .admin-health-cal-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 22px);
            gap: 3px;
            margin-bottom: 6px;
            width: fit-content;
            max-width: 100%;
        }
        .admin-health-cal-weekdays span {
            text-align: center;
            font-size: 8px;
            font-weight: 700;
            color: var(--health-muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            line-height: 1;
        }
        .admin-health-cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 22px);
            gap: 3px;
            width: fit-content;
            max-width: 100%;
        }
        .admin-health-cal-cell {
            width: 22px;
            height: 22px;
            min-width: 22px;
            min-height: 22px;
            box-sizing: border-box;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            border: 1px solid transparent;
            transition: transform 0.12s ease;
        }
        .admin-health-cal-cell.empty {
            visibility: hidden;
        }
        .admin-health-cal-cell.ok {
            background: rgba(34, 197, 94, 0.14);
            color: #166534;
            border-color: rgba(34, 197, 94, 0.28);
        }
        .admin-health-cal-cell.bad {
            background: rgba(239, 68, 68, 0.08);
            color: #b91c1c;
            border-color: rgba(239, 68, 68, 0.2);
        }
        .admin-health-cal-cell.future {
            background: #f8fafc;
            color: #cbd5e1;
            border-color: #e2e8f0;
        }
        .admin-health-cal-cell.pending {
            background: rgba(245, 158, 11, 0.12);
            color: #a16207;
            border-color: rgba(245, 158, 11, 0.35);
            box-shadow: 0 0 0 1px rgba(245, 158, 11, 0.15);
        }
        .admin-health-cal-cell--interactive {
            cursor: pointer;
        }
        .admin-health-cal-cell--interactive:hover {
            transform: scale(1.08);
            z-index: 1;
        }
        .admin-health-cal-cell--interactive:focus-visible {
            outline: 2px solid var(--primary-500);
            outline-offset: 1px;
        }
        .admin-health-cal-detail {
            margin-top: var(--space-4);
            width: 100%;
            max-width: 100%;
        }
        .admin-health-cal-detail[hidden] {
            display: none !important;
        }
        .admin-health-cal-detail-card {
            background: linear-gradient(165deg, #fafbfc 0%, #f4f7fa 100%);
            border: 1px solid var(--health-line-strong);
            border-radius: var(--radius-lg);
            padding: var(--space-4);
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
        }
        .admin-health-cal-detail-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--space-3);
            margin-bottom: var(--space-3);
        }
        .admin-health-cal-detail-title {
            margin: 0;
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--health-ink);
            letter-spacing: -0.02em;
        }
        .admin-health-cal-detail-close {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border: 1px solid var(--health-line-strong);
            border-radius: var(--radius-full);
            background: #fff;
            color: var(--health-muted);
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .admin-health-cal-detail-close:hover {
            background: var(--health-elevated);
            color: var(--health-ink);
        }
        .admin-health-cal-detail-body {
            font-size: var(--text-xs);
            color: var(--health-ink);
        }
        .admin-health-cal-detail-msg {
            margin: 0;
            color: var(--health-muted);
            line-height: 1.5;
        }
        .admin-health-cal-detail-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }
        .admin-health-cal-detail-table th,
        .admin-health-cal-detail-table td {
            text-align: left;
            padding: 8px 10px;
            border-bottom: 1px solid var(--health-line);
        }
        .admin-health-cal-detail-table th {
            color: var(--health-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            font-size: 9px;
        }
        .admin-health-cal-detail-table tr:last-child td {
            border-bottom: none;
        }
        .admin-health-cal-detail-table td {
            font-variant-numeric: tabular-nums;
        }
        .admin-health-cal-legend {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin-top: var(--space-4);
            padding-top: var(--space-3);
            border-top: 1px solid var(--health-line);
            font-size: 10px;
            color: var(--health-muted);
        }
        .admin-health-cal-legend span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 12px;
        }
        .admin-health-cal-legend span + span {
            border-left: 1px solid var(--health-line-strong);
        }
        .admin-health-cal-dot {
            width: 8px;
            height: 8px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        .admin-health-cal-dot.ok { background: #22c55e; opacity: 0.85; }
        .admin-health-cal-dot.bad { background: #ef4444; opacity: 0.75; }
        .admin-health-cal-dot.pending { background: #f59e0b; opacity: 0.85; }
        .admin-health-cal-dot.future { background: #e2e8f0; }

        /* Health section — mobile (≤768px) */
        @media (max-width: 768px) {
            .admin-health-wrap {
                margin-bottom: var(--space-6);
            }
            .admin-health-wrap > .admin-section-bar {
                margin-bottom: var(--space-3);
                width: 100%;
            }
            .admin-health-title-row {
                flex: 0 0 auto;
                width: 100%;
                flex-wrap: wrap;
                align-items: center;
                justify-content: flex-start;
                gap: 8px 10px;
            }
            .admin-health-title-row .admin-section-title {
                flex: 1 1 140px;
                min-width: 0;
            }
            .admin-health-wrap .admin-section-title {
                font-size: var(--text-base);
                letter-spacing: -0.03em;
            }
            .admin-health-wrap .admin-health-status-pill {
                align-self: center;
                padding: 4px 12px;
                font-size: 11px;
            }
            .admin-health-wrap .admin-health-actions {
                justify-content: flex-start;
                align-items: center;
                flex-wrap: nowrap;
                padding-top: 0;
                margin-top: 0;
                margin-left: 0;
                border-top: none;
                width: auto;
                flex: 0 0 auto;
                gap: 6px;
            }
            .admin-health-run-btn {
                min-height: 40px;
                padding: 8px 14px;
                font-size: var(--text-sm);
                -webkit-tap-highlight-color: transparent;
                flex-shrink: 0;
            }
            .admin-health-run-status {
                font-size: 10px;
                text-align: left;
                max-width: 9rem;
                padding-left: 0;
                line-height: 1.3;
                flex: 0 1 auto;
                min-width: 0;
            }
            .admin-health-panel {
                padding: var(--space-4) var(--space-3);
                border-radius: var(--radius-lg);
            }
            .admin-health-metrics {
                grid-template-columns: 1fr 1fr;
                gap: var(--space-3);
                padding: var(--space-3);
            }
            .admin-health-metric-value {
                font-size: var(--text-base);
            }
            .admin-health-cal-toolbar {
                display: grid;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto auto;
                gap: 6px 12px;
                align-items: center;
                margin-bottom: var(--space-4);
            }
            .admin-health-cal-toolbar label[for="adminHealthCalMonth"] {
                grid-column: 1;
                grid-row: 1;
            }
            .admin-health-cal-toolbar label[for="adminHealthCalYear"] {
                grid-column: 2;
                grid-row: 1;
            }
            .admin-health-cal-toolbar #adminHealthCalMonth {
                grid-column: 1;
                grid-row: 2;
                width: 100%;
                min-height: 44px;
                padding: 8px 12px;
                font-size: 16px;
            }
            .admin-health-cal-toolbar #adminHealthCalYear {
                grid-column: 2;
                grid-row: 2;
                width: 100%;
                min-height: 44px;
                padding: 8px 12px;
                font-size: 16px;
            }
            /* Two months in one row — compact grid (~137px + gap + ~137px fits ~320px content) */
            .admin-health-cal-months {
                display: grid;
                grid-template-columns: repeat(2, max-content);
                justify-content: center;
                align-items: start;
                column-gap: 6px;
                row-gap: 0;
                width: 100%;
                max-width: 100%;
                min-width: 0;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                padding-bottom: 4px;
                box-sizing: border-box;
            }
            .admin-health-cal-month {
                width: max-content;
                flex-shrink: 0;
            }
            .admin-health-cal-month:nth-child(n + 3) {
                display: none;
            }
            .admin-health-cal-month .admin-health-cal-title {
                font-size: 10px;
                margin-bottom: 4px;
            }
            .admin-health-cal-month .admin-health-cal-title span {
                font-size: 9px;
            }
            .admin-health-cal-weekdays,
            .admin-health-cal-grid {
                grid-template-columns: repeat(7, 17px);
                gap: 2px;
            }
            .admin-health-cal-weekdays span {
                font-size: 7px;
            }
            .admin-health-cal-cell {
                width: 17px;
                height: 17px;
                min-width: 17px;
                min-height: 17px;
                font-size: 8px;
                border-radius: 3px;
            }
            .admin-health-cal-legend {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px 12px;
                margin-top: var(--space-3);
                justify-content: stretch;
                justify-items: start;
            }
            .admin-health-cal-legend span {
                justify-content: flex-start;
                padding: 0;
                border-left: none !important;
            }
            .admin-health-cal-month {
                padding: var(--space-2);
            }
        }
        @media (min-width: 769px) {
            .admin-health-cal-toolbar {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
            }
        }

        /* ---------- Stat cards ---------- */
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-5);
            margin-bottom: var(--space-8);
        }
        .admin-stat {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: var(--space-5) var(--space-5) var(--space-5) var(--space-6);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: var(--space-4);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .admin-stat:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        /* coloured left stripe */
        .admin-stat::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            border-radius: var(--radius-xl) 0 0 var(--radius-xl);
        }
        .admin-stat.stat-users::before  { background: linear-gradient(180deg, var(--primary-400), var(--primary-600)); }
        .admin-stat.stat-groups::before { background: linear-gradient(180deg, #818cf8, var(--adm-indigo)); }
        .admin-stat.stat-exp::before    { background: linear-gradient(180deg, #fcd34d, var(--adm-amber)); }


        /* Sub-label — visible on both desktop and mobile */
        .admin-stat-sub {
            font-size: 11px;
            color: var(--text-tertiary);
            font-weight: 500;
            margin-top: 3px;
        }

        .admin-stat-icon {
            width: 46px;
            height: 46px;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .stat-users  .admin-stat-icon { background: var(--primary-50);  color: var(--primary-600); }
        .stat-groups .admin-stat-icon { background: #eef2ff;             color: var(--adm-indigo); }
        .stat-exp    .admin-stat-icon { background: #fffbeb;             color: var(--adm-amber); }
        .admin-stat-icon svg { width: 22px; height: 22px; }

        .admin-stat-body { flex: 1; min-width: 0; }
        .admin-stat-value {
            font-size: 1.875rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
            letter-spacing: -0.04em;
        }
        .admin-stat-label {
            font-size: var(--text-xs);
            color: var(--text-secondary);
            margin-top: 5px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        /* ---------- Section bar (above table) ---------- */
        .admin-section-bar {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            margin-bottom: var(--space-4);
            flex-wrap: wrap;
        }
        .admin-sort-btns {
            display: flex;
            gap: var(--space-1);
            margin-left: auto;
        }
        .admin-sort-btn {
            padding: 4px 12px;
            font-size: var(--text-xs);
            font-weight: 500;
            font-family: var(--font-family);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            background: var(--surface);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }
        .admin-sort-btn:hover { border-color: var(--primary-400); color: var(--primary-600); }
        .admin-sort-btn.active {
            background: var(--primary-600);
            border-color: var(--primary-600);
            color: #fff;
        }
        .admin-section-title {
            font-size: var(--text-base);
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            margin: 0;
        }
        .admin-section-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 2px 10px;
            background: var(--primary-100);
            color: var(--primary-700);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 700;
        }

        /* ---------- Table ---------- */
        .admin-table-wrap {
            background: var(--surface);
            border-radius: var(--radius-xl);
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--text-sm);
        }
        .admin-table th {
            text-align: left;
            padding: var(--space-3) var(--space-5);
            background: #f8fafc;
            font-weight: 600;
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            border-bottom: 1px solid var(--border);
        }
        .admin-table td {
            padding: var(--space-4) var(--space-5);
            border-bottom: 1px solid var(--border-subtle);
            color: var(--text-primary);
            vertical-align: middle;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .admin-table tbody tr {
            cursor: pointer;
            transition: background-color 0.15s;
        }
        .admin-table tbody tr:hover:not(.expanded) { background: #f8fafc; }
        .admin-table tbody tr.expanded            { background: var(--primary-50); }
        .admin-table tbody tr:last-child td       { border-bottom: none; }

        /* Avatar + email/name stacked cell */
        .user-cell {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            flex-shrink: 0;
            letter-spacing: 0;
            text-transform: uppercase;
        }
        .user-avatar.av-green  { background: var(--primary-100);  color: var(--primary-700); }
        .user-avatar.av-indigo { background: #e0e7ff;             color: #4338ca; }
        .user-avatar.av-amber  { background: #fef3c7;             color: #b45309; }
        .user-avatar.av-rose   { background: #ffe4e6;             color: #be123c; }
        .user-info-primary {
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--text-primary);
            overflow-wrap: break-word;
            word-break: break-all;
        }
        .user-info-secondary {
            font-size: var(--text-xs);
            color: var(--text-tertiary);
            margin-top: 2px;
            overflow-wrap: break-word;
        }

        /* Group count badge */
        .group-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 28px;
            height: 24px;
            padding: 0 8px;
            background: var(--primary-50);
            color: var(--primary-700);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 700;
            border: 1px solid var(--primary-100);
        }
        .group-badge.zero {
            background: var(--gray-100);
            color: var(--text-tertiary);
            border-color: var(--gray-200);
        }

        /* Date badge */
        .date-text {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            white-space: nowrap;
        }

        /* ---------- Expanded panel ---------- */
        .admin-table .expand-cell {
            padding: 0;
            vertical-align: top;
        }
        .admin-table .expand-cell .inner {
            display: flex;
            align-items: stretch;
            gap: 0;
            background: var(--primary-50);
            border-top: none;
            border-bottom: 1px solid var(--primary-100);
            animation: expandFadeIn 0.2s ease;
        }
        @keyframes expandFadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        /* Desktop: animated green left bar */
        .expand-panel-accent {
            width: 4px;
            flex-shrink: 0;
            background: var(--primary-500);
            border-radius: 0;
            transform-origin: top;
            animation: accentSlideDown 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes accentSlideDown {
            from { transform: scaleY(0); }
            to   { transform: scaleY(1); }
        }
        .expand-panel-body {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--space-8);
            padding: var(--space-5) var(--space-6);
            min-width: 0;
            position: relative;
        }
        .expand-detail-left {
            flex: 1;
            min-width: 0;
        }
        .expand-panel-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: var(--space-3);
        }
        .groups-list {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
        }
        .groups-list li {
            display: inline-block;
            padding: 5px 12px;
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--primary-800);
            background: var(--primary-50);
            border: 1px solid var(--primary-200);
            border-radius: var(--radius-full);
            overflow-wrap: break-word;
            max-width: 100%;
        }
        .groups-empty {
            font-size: var(--text-sm);
            color: var(--text-tertiary);
            font-style: italic;
        }

        /* Expand right side (actions + meta) */
        .expand-panel-right {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: var(--space-3);
            min-width: 120px;
        }
        .expand-panel-meta {
            font-size: var(--text-xs);
            color: var(--text-tertiary);
            text-align: right;
            line-height: 1.5;
        }
        .btn-delete-user {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            font-size: var(--text-xs);
            font-weight: 600;
            color: var(--danger-600);
            background: var(--danger-50);
            border: 1.5px solid var(--danger-200);
            border-radius: var(--radius-full);
            cursor: pointer;
            white-space: nowrap;
            letter-spacing: 0.01em;
            transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
        }
        .btn-delete-user:hover {
            background: var(--danger-100);
            border-color: var(--danger-400);
            color: var(--danger-700);
            box-shadow: 0 2px 8px rgba(185, 28, 28, 0.15);
        }
        .btn-delete-user:focus-visible {
            outline: 2px solid var(--danger-400);
            outline-offset: 2px;
        }
        .btn-delete-user svg {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
        }

        /* ---------- Misc ---------- */
        .admin-msg {
            padding: var(--space-4) var(--space-5);
            background: var(--primary-50);
            border-radius: var(--radius-lg);
            color: var(--primary-800);
            margin-bottom: var(--space-4);
            border: 1px solid var(--primary-200);
            font-size: var(--text-sm);
            font-weight: 500;
        }
        .admin-error {
            background: var(--danger-50);
            color: var(--danger-700);
            border-color: var(--danger-200);
        }
        .admin-table .admin-empty-row {
            text-align: center;
            padding: var(--space-16) var(--space-6);
        }
        .admin-table .admin-empty-text {
            font-size: var(--text-sm);
            color: var(--text-tertiary);
        }

        /* ---------- Sign-in ---------- */
        .admin-signin-wrap {
            height: 100%;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-6);
            background: #f1f5f9;
            overflow: hidden;
        }
        .admin-signin-card {
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border-radius: var(--radius-2xl);
            padding: var(--space-10) var(--space-8);
            box-shadow: var(--shadow-xl);
        }
        .admin-signin-logo {
            margin-bottom: var(--space-6);
        }
        .admin-signin-card h2 {
            margin: 0 0 var(--space-2);
            font-size: var(--text-2xl);
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.03em;
        }
        .admin-signin-card .admin-signin-subtitle {
            margin: 0 0 var(--space-8);
            font-size: var(--text-sm);
            color: var(--text-secondary);
            line-height: 1.55;
        }
        .admin-signin-card .admin-field {
            margin-bottom: var(--space-5);
        }
        .admin-signin-card label {
            display: block;
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }
        .admin-signin-card .admin-input {
            width: 100%;
            height: 44px;
            padding: 0 var(--space-4);
            font-size: var(--text-base);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--surface);
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: var(--font-family);
        }
        .admin-signin-card .admin-input::placeholder { color: var(--text-tertiary); }
        .admin-signin-card .admin-input:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.12);
        }
        .admin-password-wrap {
            display: flex;
            align-items: center;
            height: 44px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-lg);
            background: var(--surface);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .admin-password-wrap:focus-within {
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.12);
        }
        .admin-password-wrap input {
            flex: 1;
            min-width: 0;
            height: 100%;
            margin: 0;
            padding: 0 var(--space-4);
            padding-right: var(--space-2);
            border: none;
            background: transparent;
            font-size: var(--text-base);
            box-sizing: border-box;
            font-family: var(--font-family);
        }
        .admin-password-wrap input,
        .admin-password-wrap input:focus {
            outline: none !important;
            box-shadow: none !important;
            border: none !important;
        }
        .admin-toggle-pw {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            margin: 0;
            padding: 0;
            border: none;
            background: none;
            cursor: pointer;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-toggle-pw:hover { color: var(--text-secondary); }
        .admin-toggle-pw:focus-visible { outline: 2px solid var(--primary-500); outline-offset: -2px; }
        .admin-toggle-pw svg { width: 20px; height: 20px; display: block; }
        .admin-signin-card .btn-signin {
            width: 100%;
            height: 46px;
            margin-top: var(--space-3);
            padding: 0;
            font-size: var(--text-base);
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--primary-600) 0%, var(--primary-700) 100%);
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            letter-spacing: -0.01em;
            transition: box-shadow 0.2s, filter 0.2s;
            box-shadow: 0 2px 8px rgba(21, 128, 61, 0.3);
        }
        .admin-signin-card .btn-signin:hover {
            filter: brightness(1.05);
            box-shadow: 0 4px 14px rgba(21, 128, 61, 0.4);
        }
        .admin-signin-card .btn-signin:disabled { opacity: 0.55; cursor: not-allowed; }
        .admin-signin-status {
            margin-top: var(--space-4);
            font-size: var(--text-sm);
            min-height: 1.25rem;
            line-height: 1.4;
        }
        .admin-signin-status.error   { color: var(--danger-600); }
        .admin-signin-status.success { color: var(--primary-600); }
        @media (max-height: 560px) {
            .admin-signin-card { padding: var(--space-5) var(--space-6); }
            .admin-signin-card .admin-signin-subtitle { margin-bottom: var(--space-5); }
            .admin-signin-card .admin-field { margin-bottom: var(--space-3); }
        }

        /* ---------- Loading screen ---------- */
        .admin-loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: linear-gradient(145deg, var(--primary-600) 0%, var(--primary-700) 60%, var(--primary-800) 100%);
            z-index: 9999;
        }
        .admin-loading-screen.hidden { display: none; }
        .admin-loading-logo-wrap {
            text-align: center;
            margin-bottom: 2rem;
        }
        .admin-loading-logo-wrap img {
            height: 100px;
            width: auto;
            max-width: 200px;
            display: block;
            margin: 0 auto;
            object-fit: contain;
        }
        .admin-loading-logo-wrap img[data-fallback] { display: none; }
        .admin-loading-spinner {
            border: 3px solid rgba(255,255,255,0.25);
            border-top-color: #fff;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: admin-spin 0.8s linear infinite;
        }
        .admin-loading-message {
            margin-top: 1.25rem;
            color: rgba(255,255,255,0.65);
            font-size: var(--text-sm);
            font-weight: 500;
            letter-spacing: 0.01em;
        }
        @keyframes admin-spin { to { transform: rotate(360deg); } }

        /* ---------- Analytics section ---------- */
        /* Tab bar — hidden on desktop, shown on mobile */
        .analytics-tab-bar {
            display: none;
        }

        .admin-analytics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-5);
            margin-bottom: var(--space-8);
        }
        .admin-chart-card {
            background: var(--surface);
            border-radius: var(--radius-xl);
            padding: var(--space-6);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        /* subtle top accent stripe */
        .admin-chart-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        }
        .admin-chart-card.chart-signups::before { background: linear-gradient(90deg, var(--primary-500), var(--primary-400)); }
        .admin-chart-card.chart-dist::before    { background: linear-gradient(90deg, var(--adm-indigo), #818cf8); }
        .admin-chart-card.chart-top::before     { background: linear-gradient(90deg, var(--adm-amber), #fcd34d); }

        .admin-chart-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: var(--space-5);
            gap: var(--space-3);
        }
        .admin-chart-title {
            font-size: var(--text-xs);
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            line-height: 1.3;
        }
        .admin-chart-subtitle {
            font-size: 11px;
            color: var(--text-tertiary);
            font-weight: 400;
            margin-top: 2px;
        }
        .admin-chart-kpi {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
            white-space: nowrap;
        }
        .admin-chart-kpi-label {
            font-size: 10px;
            color: var(--text-tertiary);
            font-weight: 500;
            margin-top: 3px;
            text-align: right;
        }
        .admin-chart-wrap {
            position: relative;
            flex: 1;
            min-height: 150px;
        }

        /* Top users list */
        .top-users-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
        }
        .top-user-row {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        .top-user-rank {
            width: 20px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-tertiary);
            flex-shrink: 0;
            text-align: center;
        }
        .top-user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        .top-user-info { flex: 1; min-width: 0; }
        .top-user-name {
            font-size: var(--text-xs);
            font-weight: 600;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .top-user-bar-wrap {
            flex: 0 0 80px;
            height: 6px;
            background: var(--gray-100);
            border-radius: 99px;
            overflow: hidden;
        }
        .top-user-bar {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--adm-amber), #fcd34d);
            transition: width 0.4s ease;
        }
        .top-user-count {
            font-size: var(--text-xs);
            font-weight: 700;
            color: var(--text-secondary);
            flex-shrink: 0;
            width: 18px;
            text-align: right;
        }

        /* Scrollbar handled globally in css/style.css */

        /* =========================================
           RESPONSIVE — Mobile-first redesign
           ========================================= */

        /* --- Tablet (≤768px) --- */
        @media (max-width: 768px) {
            /* Header */
            .admin-header { height: auto; padding: var(--space-4) 0; }
            .admin-header-inner { height: auto; padding: 0 var(--space-4); }
            .header-brand { gap: 8px; }
            .header-brand .brand-logo { height: 26px; }
            .header-app-name { font-size: var(--text-xl); }
            .header-admin-label { font-size: var(--text-xs); letter-spacing: var(--tracking-wide); }
            /* Compact pill for back-link, plain sign-out */
            .admin-header .back-link {
                padding: 6px 12px;
                font-size: var(--text-xs);
            }
            .header-nav-divider { display: none; }
            .admin-header .sign-out-link { font-size: var(--text-xs); padding: 6px 4px; }
            .admin-header .header-nav { gap: var(--space-2); align-items: center; }

            /* Main container */
            .admin-main { padding: var(--space-5) var(--space-4); }

            /* Analytics — tabbed panel on mobile */
            .analytics-tab-bar {
                display: flex;
                background: var(--surface);
                border-radius: var(--radius-xl) var(--radius-xl) 0 0;
                padding: var(--space-1);
                gap: 4px;
                box-shadow: var(--shadow-md);
                overflow: hidden;
                border-bottom: 1px solid var(--border-subtle);
            }
            .atab {
                flex: 1;
                height: 38px;
                border: none;
                background: none;
                border-radius: var(--radius-lg);
                font-family: var(--font-family);
                font-size: var(--text-xs);
                font-weight: 600;
                color: var(--text-tertiary);
                cursor: pointer;
                transition: background 0.15s, color 0.15s;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 5px;
                white-space: nowrap;
            }
            .atab.active {
                background: var(--primary-50);
                color: var(--primary-700);
            }
            .atab svg { flex-shrink: 0; }
            .admin-analytics {
                grid-template-columns: 1fr;
                gap: 0;
                margin-bottom: var(--space-4);
            }
            /* All chart cards hidden by default; JS adds .tab-active to show one */
            .admin-chart-card { display: none; }
            .admin-chart-card.tab-active {
                display: flex;
                border-radius: 0 0 var(--radius-xl) var(--radius-xl);
                box-shadow: var(--shadow-md);
                padding: var(--space-4);
            }
            /* Remove top accent stripe on mobile — replaced by tab bar */
            .admin-chart-card.tab-active::before { display: none; }
            .admin-chart-header { margin-bottom: var(--space-3); }
            .admin-chart-wrap { min-height: 200px; }
            .admin-chart-kpi { font-size: var(--text-lg); }
            .top-user-bar-wrap { flex: 0 0 60px; }
            .top-users-list { gap: 10px; }

            /* Stats — 2 column grid, 3rd card spans full width */
            .admin-stats {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--space-3);
                margin-bottom: var(--space-5);
            }
            .admin-stat { padding: var(--space-3) var(--space-3) var(--space-3) var(--space-4); gap: var(--space-3); }
            .admin-stat-icon { width: 38px; height: 38px; }
            .admin-stat-icon svg { width: 19px; height: 19px; }
            .admin-stat-value { font-size: var(--text-xl); }
            .admin-stat-label { font-size: 10px; letter-spacing: 0.03em; }
            .admin-stat-sub { font-size: 10px; }
            /* Expenses card — intentional full-width feature row */
            .admin-stat.stat-exp {
                grid-column: 1 / -1;
                align-items: center;
                padding: var(--space-3) var(--space-4);
            }
            .admin-stat.stat-exp .admin-stat-icon { width: 44px; height: 44px; }
            .admin-stat.stat-exp .admin-stat-value { font-size: var(--text-2xl); }
            .admin-stat.stat-exp .admin-stat-body {
                display: flex;
                flex-direction: row;
                align-items: center;
                gap: var(--space-3);
                flex-wrap: wrap;
            }
            .admin-stat.stat-exp .admin-stat-label { margin-top: 0; }
            .admin-stat.stat-exp .admin-stat-sub {
                margin-top: 0;
                margin-left: auto;
            }

            /* Section bar */
            .admin-section-bar { margin-bottom: var(--space-3); }

            /* Table container */
            .admin-table-wrap { border-radius: var(--radius-lg); }
            .admin-table { display: block; min-width: 0; }
            .admin-table thead { display: none; }
            .admin-table tbody { display: block; }

            /* Each user row — flex card layout */
            .admin-table tbody tr:not(.expand-row) {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: var(--space-2);
                padding: var(--space-4) var(--space-4) var(--space-3);
                border-bottom: 1px solid var(--border-subtle);
                cursor: pointer;
                position: relative;
            }
            .admin-table tbody tr:not(.expand-row):last-child { border-bottom: none; }
            .admin-table tbody tr.expanded {
                background: var(--primary-50);
                border-bottom-color: var(--primary-100);
            }

            /* Tap chevron hint (top-right) */
            .admin-table tbody tr:not(.expand-row)::after {
                content: '›';
                position: absolute;
                right: var(--space-4);
                top: 50%;
                transform: translateY(-50%);
                font-size: 18px;
                color: var(--text-tertiary);
                transition: color 0.15s, transform 0.2s;
                line-height: 1;
            }
            .admin-table tbody tr.expanded::after {
                color: var(--primary-500);
                transform: translateY(-50%) rotate(90deg);
            }

            /* td resets */
            .admin-table tbody tr:not(.expand-row) td {
                border: none;
                padding: 0;
                overflow-wrap: break-word;
                word-break: break-word;
            }

            /* First td — user cell: flex 1, leave room for badge + chevron */
            .admin-table tbody tr:not(.expand-row) td:nth-child(1) {
                flex: 1 1 0;
                min-width: 0;
                padding-right: var(--space-2);
            }

            /* Second td — date: hide on mobile, shown in expand panel */
            .admin-table tbody tr:not(.expand-row) td:nth-child(2) {
                display: none;
            }

            /* Third td — group badge: sits right of user info */
            .admin-table tbody tr:not(.expand-row) td:nth-child(3) {
                flex: 0 0 auto;
                padding-right: var(--space-5);
            }

            /* Expand row */
            .admin-table tbody tr.expand-row {
                display: block;
                padding: 0;
                border-bottom: 1px solid var(--primary-100);
                background: var(--primary-50);
            }
            .admin-table tbody tr.expand-row:last-child { border-bottom: none; }
            .admin-table tbody tr.expand-row td::before { content: none; display: none; }

            /* Expand panel */
            .admin-table .expand-cell { display: block; padding: 0; }
            .expand-panel-accent { display: none; }
            .expand-panel-body {
                flex-direction: row;
                align-items: flex-start;
                justify-content: space-between;
                gap: var(--space-4);
                padding: var(--space-4) var(--space-4);
                border-top: none;
                background: var(--primary-50);
                overflow: hidden;
            }
            /* Mobile: animated green top line */
            .expand-panel-body::before {
                content: '';
                position: absolute;
                top: 0; left: 0;
                height: 3px;
                width: 100%;
                background: linear-gradient(90deg, var(--primary-500) 0%, var(--primary-400) 100%);
                transform-origin: left;
                animation: lineSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                border-radius: 0 2px 2px 0;
            }
            @keyframes lineSlideIn {
                from { transform: scaleX(0); }
                to   { transform: scaleX(1); }
            }
            .expand-panel-right {
                flex-direction: column;
                align-items: flex-end;
                gap: var(--space-2);
                min-width: auto;
                flex-shrink: 0;
            }
            .expand-panel-meta {
                text-align: right;
                font-size: 11px;
                color: var(--text-tertiary);
                white-space: nowrap;
            }
            .btn-delete-user {
                white-space: nowrap;
            }

            /* Empty state */
            .admin-table tr .admin-empty-row { display: block; padding: var(--space-10) var(--space-4); text-align: center; }
            .admin-table tr .admin-empty-row::before { display: none; }

            /* Sign-in */
            .admin-signin-wrap { padding: var(--space-4); }
            .admin-signin-card { padding: var(--space-8) var(--space-5); }
        }

        /* --- Phone (≤480px) --- */
        @media (max-width: 480px) {
            .header-brand .brand-logo { height: 22px; }
            .header-brand { gap: 6px; }
            .admin-header .sign-out-link { font-size: var(--text-xs); }
            .admin-main { padding: var(--space-4) var(--space-3); }
            .admin-stats {
                grid-template-columns: repeat(2, 1fr);
                gap: var(--space-2);
                margin-bottom: var(--space-4);
            }
            .admin-stat { padding: var(--space-2) var(--space-2) var(--space-2) var(--space-3); gap: var(--space-2); }
            .admin-stat-icon { width: 32px; height: 32px; border-radius: var(--radius-md); }
            .admin-stat-icon svg { width: 16px; height: 16px; }
            .admin-stat-value { font-size: var(--text-lg); }
            .admin-stat-label { font-size: 10px; margin-top: 3px; }
            .admin-stat-sub { font-size: 10px; }
            /* Keep expenses full-width card compact on tiny screens */
            .admin-stat.stat-exp { padding: var(--space-3); }
            .admin-stat.stat-exp .admin-stat-icon { width: 36px; height: 36px; }
            .admin-stat.stat-exp .admin-stat-value { font-size: var(--text-xl); }
            .admin-section-title { font-size: var(--text-sm); }
            .user-avatar { width: 32px; height: 32px; font-size: 13px; }
            .user-info-primary { font-size: var(--text-xs); }
            .user-info-secondary { font-size: 11px; }
            .expand-panel-body { padding: var(--space-3); gap: var(--space-3); }
            .expand-panel-label { font-size: 10px; }
            .groups-list li { font-size: 11px; padding: 4px 10px; }
            .admin-signin-card { padding: var(--space-6) var(--space-4); }
            .admin-signin-card h2 { font-size: var(--text-xl); }

            /* Analytics — tighter on very small screens */
            .atab { font-size: 11px; height: 36px; gap: 3px; }
            .admin-chart-card.tab-active { padding: var(--space-3) var(--space-3) var(--space-4); }
            .admin-chart-wrap { min-height: 180px; }
            .top-user-bar-wrap { flex: 0 0 44px; }
            .top-user-avatar { width: 26px; height: 26px; font-size: 11px; }
            .top-user-name { font-size: 11px; }
        }
    </style>
</head>
<body>
    <div id="adminLoadingScreen" class="admin-loading-screen">
        <div class="admin-loading-logo-wrap">
            <img src="images/preview.png" alt="SplitXpense" onerror="this.style.display='none'">
        </div>
        <div class="admin-loading-spinner"></div>
        <p id="adminLoadingMessage" class="admin-loading-message">Loading…</p>
    </div>
    <div class="admin-page" id="adminPageContent" style="display: none;">
        <div class="admin-header">
            <div class="admin-header-inner">
                <div class="header-brand">
                    <div class="header-brand-text">
                        <span class="header-app-name">SplitXpense</span>
                        <span class="header-admin-label">Admin Panel</span>
                    </div>
                </div>
                <div class="header-nav" id="adminHeaderLinks">
                    <a href="index.html" id="adminBackLink" class="back-link">← Back to app</a>
                </div>
            </div>
        </div>
        <div class="admin-main">
            <div id="adminContent"></div>
        </div>
        <div data-app-footer></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/shared-supabase.js"></script>
    <script src="js/shared-sync.js"></script>
    <script>
        (function() {
            var content = document.getElementById('adminContent');
            var ALLOWED_ADMIN_EMAIL = 'saishilpha26@gmail.com';

            function hideAdminLoading() {
                var loading = document.getElementById('adminLoadingScreen');
                var page = document.getElementById('adminPageContent');
                if (loading) loading.classList.add('hidden');
                if (page) page.style.display = 'flex';
            }

            function escapeHtml(s) {
                var div = document.createElement('div');
                div.textContent = s;
                return div.innerHTML;
            }

            var currentStats = null;
            var expandedIndex = -1;
            var chartSignups = null;
            var chartDist    = null;

            /* ---- Analytics helpers ---- */
            function getMonthlySignups(users, months) {
                var now = new Date();
                var buckets = [];
                for (var i = months - 1; i >= 0; i--) {
                    var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                    var key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
                    buckets.push({ label: d.toLocaleDateString(undefined, { month: 'short', year: '2-digit' }), key: key, count: 0 });
                }
                users.forEach(function(u) {
                    var raw = u.created_at || u.createdAt;
                    if (!raw) return;
                    var d = new Date(raw);
                    if (isNaN(d.getTime())) return;
                    var key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
                    var b = buckets.find(function(x) { return x.key === key; });
                    if (b) b.count++;
                });
                return buckets;
            }

            function getGroupDist(users) {
                var dist = [0, 0, 0, 0]; // 0, 1, 2, 3+
                users.forEach(function(u) {
                    var g = u.groupCount || 0;
                    if (g === 0) dist[0]++;
                    else if (g === 1) dist[1]++;
                    else if (g === 2) dist[2]++;
                    else dist[3]++;
                });
                return dist;
            }

            function getTopUsers(users, n) {
                return users
                    .filter(function(u) { return (u.groupCount || 0) > 0; })
                    .sort(function(a, b) { return (b.groupCount || 0) - (a.groupCount || 0); })
                    .slice(0, n);
            }

            function destroyCharts() {
                if (chartSignups) { chartSignups.destroy(); chartSignups = null; }
                if (chartDist)    { chartDist.destroy();    chartDist    = null; }
            }

            function initSignupsChart(stats) {
                var users = stats.users || [];
                var signupData = getMonthlySignups(users, 6);
                var ctx = document.getElementById('chartSignups');
                if (!ctx) return;
                chartSignups = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: signupData.map(function(b) { return b.label; }),
                        datasets: [{
                            label: 'New users',
                            data: signupData.map(function(b) { return b.count; }),
                            backgroundColor: 'rgba(34,197,94,0.18)',
                            borderColor: '#22c55e',
                            borderWidth: 2,
                            borderRadius: 6,
                            borderSkipped: false
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(c) { return ' ' + c.parsed.y + ' user' + (c.parsed.y !== 1 ? 's' : ''); } } } },
                        scales: {
                            x: { grid: { display: false }, ticks: { font: { size: 11 }, color: '#94a3b8' } },
                            y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 11 }, color: '#94a3b8', stepSize: 1, precision: 0 }, beginAtZero: true }
                        }
                    }
                });
            }

            function initDistChart(stats) {
                var users = stats.users || [];
                var distData = getGroupDist(users);
                var ctx = document.getElementById('chartDist');
                if (!ctx) return;
                chartDist = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['0 groups', '1 group', '2 groups', '3+ groups'],
                        datasets: [{
                            data: distData,
                            backgroundColor: ['#e2e8f0', '#22c55e', '#6366f1', '#f59e0b'],
                            borderWidth: 0,
                            hoverOffset: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '68%',
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { font: { size: 11 }, color: '#64748b', boxWidth: 10, padding: 12, usePointStyle: true, pointStyleWidth: 10 }
                            },
                            tooltip: { callbacks: { label: function(c) { return ' ' + c.label + ': ' + c.parsed + ' users'; } } }
                        }
                    }
                });
            }

            function initCharts(stats) {
                var isMobile = window.innerWidth <= 768;
                if (isMobile) {
                    /* On mobile only init the visible tab (signups = default active) */
                    initSignupsChart(stats);
                } else {
                    initSignupsChart(stats);
                    initDistChart(stats);
                }
            }

            var activeTab = 'signups';
            function switchAnalyticsTab(tab) {
                if (activeTab === tab) return;
                activeTab = tab;

                /* Update tab button states */
                document.querySelectorAll('.atab').forEach(function(b) {
                    b.classList.toggle('active', b.dataset.tab === tab);
                });

                /* Show/hide panels */
                document.querySelectorAll('[data-tab-panel]').forEach(function(p) {
                    p.classList.toggle('tab-active', p.dataset.tabPanel === tab);
                });

                /* Destroy existing charts and init the one for the new tab */
                destroyCharts();
                if (!currentStats || typeof Chart === 'undefined') return;
                if (tab === 'signups') initSignupsChart(currentStats);
                if (tab === 'dist')    initDistChart(currentStats);
                /* 'top' tab has no chart */
            }

            function formatDateShort(iso) {
                if (!iso) return '—';
                try {
                    var d = new Date(iso);
                    return isNaN(d.getTime()) ? iso : d.toLocaleDateString(undefined, { month: 'numeric', day: 'numeric', year: 'numeric' });
                } catch (e) { return iso; }
            }

            function formatDateTime(iso) {
                if (!iso) return '—';
                try {
                    var d = new Date(iso);
                    return isNaN(d.getTime()) ? iso : d.toLocaleString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
                } catch (e) { return iso; }
            }

            function istStartUtc(y, m, d) {
                return Date.UTC(y, m - 1, d, 18, 30, 0) - 24 * 60 * 60 * 1000;
            }
            function daysInMonthGreg(y, m1to12) {
                return new Date(Date.UTC(y, m1to12, 0)).getUTCDate();
            }
            function istWeekdayMon0(y, m, d) {
                var inst = new Date(istStartUtc(y, m, d));
                var parts = new Intl.DateTimeFormat('en-US', { timeZone: 'Asia/Kolkata', weekday: 'short' }).formatToParts(inst);
                var wd = parts.find(function(p) { return p.type === 'weekday'; });
                var map = { Sun: 6, Mon: 0, Tue: 1, Wed: 2, Thu: 3, Fri: 4, Sat: 5 };
                return wd && map[wd.value] !== undefined ? map[wd.value] : 0;
            }
            function getISTNowYM() {
                var y;
                var m;
                new Intl.DateTimeFormat('en-US', { timeZone: 'Asia/Kolkata', year: 'numeric', month: 'numeric', day: 'numeric' }).formatToParts(new Date()).forEach(function(p) {
                    if (p.type === 'year') y = +p.value;
                    if (p.type === 'month') m = +p.value;
                });
                return { y: y, m: m };
            }
            function addMonths(y, m, delta) {
                var d = new Date(Date.UTC(y, m - 1 + delta, 1));
                return { y: d.getUTCFullYear(), m: d.getUTCMonth() + 1 };
            }
            function buildPingSetFromHealth(ah) {
                var pingSet = {};
                (ah.ping_days_ist || []).forEach(function(k) { pingSet[k] = true; });
                return pingSet;
            }
            /** Same rule as the Healthy pill: last ping within 48h, no read error. */
            function isHealthStatusUp(ah) {
                if (!ah || ah.error) return false;
                var last = ah.last_ping_at;
                if (!last) return false;
                var d = new Date(last);
                if (isNaN(d.getTime())) return false;
                var ageMs = Date.now() - d.getTime();
                return ageMs <= 48 * 60 * 60 * 1000;
            }
            function todayKeyIST() {
                return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Kolkata', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date());
            }
            function formatHealthPingIstTime(iso) {
                if (!iso) return '—';
                try {
                    var d = new Date(iso);
                    if (isNaN(d.getTime())) return '—';
                    return new Intl.DateTimeFormat(undefined, {
                        timeZone: 'Asia/Kolkata',
                        dateStyle: 'medium',
                        timeStyle: 'medium'
                    }).format(d);
                } catch (e) { return '—'; }
            }
            function formatDurationMs(ms) {
                if (ms == null || ms === '' || isNaN(Number(ms))) return '—';
                var n = Number(ms);
                if (n < 1000) return String(Math.round(n)) + ' ms';
                return (n / 1000).toFixed(n < 10000 ? 2 : 1) + ' s';
            }
            function formatIstDateTitle(dateKey) {
                var parts = dateKey.split('-');
                if (parts.length !== 3) return dateKey + ' (IST)';
                var y = parseInt(parts[0], 10);
                var m = parseInt(parts[1], 10);
                var day = parseInt(parts[2], 10);
                if (isNaN(y) || isNaN(m) || isNaN(day)) return dateKey + ' (IST)';
                var noonIstUtc = Date.UTC(y, m - 1, day, 6, 30, 0);
                try {
                    var s = new Intl.DateTimeFormat('en-US', {
                        timeZone: 'Asia/Kolkata',
                        weekday: 'short',
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    }).format(new Date(noonIstUtc));
                    return s + ' (IST)';
                } catch (e2) { return dateKey + ' (IST)'; }
            }
            function buildHealthCalDetailHtml(dateKey, dayStatus, ah, todayKey) {
                var byDay = (ah && ah.ping_log_by_day_ist) ? ah.ping_log_by_day_ist : {};
                var rows = byDay[dateKey] || [];
                if (dateKey > todayKey) {
                    return '<p class="admin-health-cal-detail-msg">This calendar day has not started yet (IST).</p>';
                }
                var html = '';
                if (rows.length > 0) {
                    html += '<table class="admin-health-cal-detail-table"><thead><tr>';
                    html += '<th>#</th><th>Time (IST)</th><th>Duration</th><th>Status</th></tr></thead><tbody>';
                    var idx;
                    for (idx = 0; idx < rows.length; idx++) {
                        var r = rows[idx];
                        html += '<tr>';
                        html += '<td>' + String(idx + 1) + '</td>';
                        html += '<td>' + escapeHtml(formatHealthPingIstTime(r.pinged_at)) + '</td>';
                        html += '<td>' + escapeHtml(formatDurationMs(r.duration_ms)) + '</td>';
                        html += '<td>OK</td>';
                        html += '</tr>';
                    }
                    html += '</tbody></table>';
                    return html;
                }
                if (ah && ah.last_ping_at) {
                    try {
                        var lastKey = new Intl.DateTimeFormat('en-CA', {
                            timeZone: 'Asia/Kolkata',
                            year: 'numeric',
                            month: '2-digit',
                            day: '2-digit'
                        }).format(new Date(ah.last_ping_at));
                        if (lastKey === dateKey) {
                            html += '<table class="admin-health-cal-detail-table"><thead><tr>';
                            html += '<th>#</th><th>Time (IST)</th><th>Duration</th><th>Status</th></tr></thead><tbody>';
