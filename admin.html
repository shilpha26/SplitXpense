<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin - SplitXpense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="images/logo.png" type="image/png">
    <meta name="theme-color" content="#22c55e">
    <style>
        /* --- Page & layout --- */
        .admin-page {
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: var(--background);
        }
        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-4) var(--space-6);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-xs);
        }
        .admin-header h1 {
            font-size: var(--text-xl);
            font-weight: 700;
            margin: 0;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }
        .admin-header .back-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            padding: var(--space-2) var(--space-3);
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--primary-600);
            background: var(--primary-50);
            border: 1px solid var(--primary-200);
            border-radius: var(--radius-md);
            text-decoration: none;
            transition: color 0.15s, background 0.15s, border-color 0.15s;
        }
        .admin-header .back-link:hover {
            color: var(--primary-700);
            background: var(--primary-100);
            border-color: var(--primary-300);
        }
        .admin-header .back-link:focus-visible {
            outline: 2px solid var(--primary-500);
            outline-offset: 2px;
        }
        .admin-main {
            max-width: 1100px;
            margin: 0 auto;
            padding: var(--space-6);
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #adminContent {
            flex: 1;
            min-height: 0;
            min-width: 0;
            overflow: auto;
        }

        /* --- Stats strip --- */
        .admin-stats {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-3);
            margin-bottom: var(--space-6);
        }
        .admin-stat {
            flex: 1;
            min-width: 120px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-4) var(--space-5);
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .admin-stat:hover {
            border-color: var(--gray-200);
            box-shadow: var(--shadow-md);
        }
        .admin-stat-value {
            font-size: var(--text-2xl);
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.2;
            letter-spacing: -0.03em;
        }
        .admin-stat-value.green { color: var(--primary-600); }
        .admin-stat-value.red { color: var(--danger-500); }
        .admin-stat-label {
            font-size: var(--text-xs);
            color: var(--text-secondary);
            margin-top: var(--space-1);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        /* --- Table --- */
        .admin-table-wrap {
            background: var(--surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--text-sm);
        }
        .admin-table th {
            text-align: left;
            padding: var(--space-3) var(--space-4);
            background: var(--gray-50);
            font-weight: 600;
            font-size: var(--text-xs);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }
        .admin-table td {
            padding: var(--space-3) var(--space-4);
            border-bottom: 1px solid var(--border-subtle);
            color: var(--text-primary);
            vertical-align: middle;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }
        .admin-table tbody tr {
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        .admin-table tbody tr:hover:not(.expanded) {
            background: var(--background-subtle);
        }
        .admin-table tbody tr.expanded {
            background: var(--primary-50);
        }
        .admin-table tbody tr.expanded:hover {
            background: var(--primary-50);
        }
        /* --- Expanded row (detail panel) --- */
        .admin-table .expand-cell {
            padding: 0;
            vertical-align: top;
        }
        .admin-table .expand-cell .inner {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: var(--space-5);
            padding: var(--space-4) var(--space-5);
            background: linear-gradient(to right, var(--primary-50) 0%, var(--surface) 100%);
            border-left: 4px solid var(--primary-500);
            font-size: var(--text-sm);
            color: var(--text-secondary);
            min-width: 0;
            overflow: visible;
        }
        .admin-table .expand-cell .inner .expand-detail-left {
            flex: 1;
            min-width: 0;
            overflow-wrap: break-word;
            word-wrap: break-word;
        }
        .admin-table .expand-cell .inner .groups-empty {
            color: var(--text-tertiary);
            font-size: var(--text-sm);
        }
        .admin-table .expand-cell .inner .groups-list {
            margin: 0;
            padding-left: var(--space-4);
        }
        .admin-table .expand-cell .inner .groups-list li {
            margin: var(--space-1) 0;
            color: var(--text-primary);
            font-size: var(--text-sm);
            overflow-wrap: break-word;
            word-wrap: break-word;
        }
        .admin-table .expand-cell .inner .expand-actions {
            flex-shrink: 0;
            align-self: flex-start;
        }
        .admin-table .btn-delete-user {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-3);
            font-size: var(--text-xs);
            font-weight: 600;
            color: var(--danger-600);
            background: var(--surface);
            border: 1px solid var(--danger-200);
            border-radius: var(--radius-md);
            cursor: pointer;
            white-space: nowrap;
            box-shadow: var(--shadow-xs);
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .admin-table .btn-delete-user:hover {
            background: var(--danger-50);
            border-color: var(--danger-300);
            color: var(--danger-700);
        }
        .admin-table .btn-delete-user:focus-visible {
            outline: 2px solid var(--danger-400);
            outline-offset: 2px;
        }
        .admin-table .btn-delete-user svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
            opacity: 0.9;
        }

        /* --- Messages --- */
        .admin-msg {
            padding: var(--space-4);
            background: var(--primary-50);
            border-radius: var(--radius-lg);
            color: var(--text-secondary);
            margin-bottom: var(--space-4);
            border: 1px solid var(--primary-200);
            font-size: var(--text-sm);
        }
        .admin-error {
            background: var(--danger-50);
            color: var(--danger-700);
            border-color: var(--danger-200);
        }
        .admin-table .admin-empty-row {
            text-align: center;
            padding: var(--space-8) var(--space-4);
        }
        .admin-table .admin-empty-text {
            font-size: var(--text-sm);
            color: var(--text-tertiary);
        }

        /* --- Admin sign-in (login) page --- */
        .admin-signin-wrap {
            height: 100%;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-6);
            background: linear-gradient(180deg, var(--gray-50) 0%, var(--background) 100%);
            overflow: hidden;
        }
        .admin-signin-card {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: var(--space-8) var(--space-6);
            box-shadow: var(--shadow-lg);
        }
        .admin-signin-card h2 {
            margin: 0 0 var(--space-2);
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }
        .admin-signin-card .admin-signin-subtitle {
            margin: 0 0 var(--space-8);
            font-size: var(--text-sm);
            color: var(--text-secondary);
            line-height: 1.45;
        }
        .admin-signin-card .admin-field {
            margin-bottom: var(--space-5);
        }
        .admin-signin-card label {
            display: block;
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }
        .admin-signin-card .admin-input {
            width: 100%;
            height: 44px;
            padding: 0 var(--space-4);
            font-size: var(--text-base);
            line-height: 44px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--surface);
            box-sizing: border-box;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .admin-signin-card .admin-input::placeholder {
            color: var(--text-tertiary);
        }
        .admin-signin-card .admin-input:focus {
            outline: none;
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px var(--primary-100);
        }
        .admin-password-wrap {
            display: flex;
            align-items: center;
            height: 44px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--surface);
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .admin-password-wrap:focus-within {
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px var(--primary-100);
        }
        .admin-password-wrap input {
            flex: 1;
            min-width: 0;
            height: 100%;
            margin: 0;
            padding: 0 var(--space-4);
            padding-right: var(--space-2);
            border: none;
            border-radius: var(--radius-md);
            background: transparent;
            font-size: var(--text-base);
            box-sizing: border-box;
        }
        .admin-password-wrap input,
        .admin-password-wrap input:focus {
            outline: none !important;
            box-shadow: none !important;
            border: none !important;
        }
        .admin-toggle-pw {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            margin: 0;
            padding: 0;
            border: none;
            background: none;
            cursor: pointer;
            color: var(--text-tertiary);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-toggle-pw:hover { color: var(--text-secondary); }
        .admin-toggle-pw:focus-visible { outline: 2px solid var(--primary-500); outline-offset: -2px; }
        .admin-toggle-pw svg {
            width: 20px;
            height: 20px;
            display: block;
        }
        .admin-signin-card .btn-signin {
            width: 100%;
            height: 44px;
            margin-top: var(--space-2);
            padding: 0;
            font-size: var(--text-base);
            font-weight: 600;
            color: var(--text-inverse);
            background: var(--primary-600);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background 0.15s;
        }
        .admin-signin-card .btn-signin:hover { background: var(--primary-700); }
        .admin-signin-card .btn-signin:disabled { opacity: 0.7; cursor: not-allowed; }
        .admin-signin-status {
            margin-top: var(--space-4);
            font-size: var(--text-sm);
            min-height: 1.25rem;
            line-height: 1.4;
        }
        .admin-signin-status.error { color: var(--danger-600); }
        .admin-signin-status.success { color: var(--primary-600); }
        @media (max-height: 560px) {
            .admin-signin-card { padding: var(--space-4) var(--space-5); }
            .admin-signin-card .admin-signin-subtitle { margin-bottom: var(--space-4); }
            .admin-signin-card .admin-field { margin-bottom: var(--space-3); }
        }

        /* --- Mobile: card layout (no horizontal scroll) --- */
        @media (max-width: 768px) {
            .admin-header {
                padding: var(--space-3) var(--space-4);
                flex-wrap: wrap;
                gap: var(--space-2);
            }
            .admin-header h1 { font-size: var(--text-lg); }
            .admin-main { padding: var(--space-4); }
            .admin-stats {
                gap: var(--space-2);
                margin-bottom: var(--space-4);
            }
            .admin-stat {
                min-width: 0;
                padding: var(--space-3) var(--space-4);
            }
            .admin-stat-value { font-size: var(--text-xl); }
            .admin-table-wrap {
                width: 100%;
                max-width: 100%;
                overflow: visible;
                border-radius: var(--radius-md);
                border: 1px solid var(--border);
                background: var(--surface);
                box-shadow: var(--shadow-sm);
            }
            .admin-table {
                display: block;
                font-size: var(--text-sm);
                min-width: 0;
            }
            .admin-table thead { display: none; }
            .admin-table tbody { display: block; }
            .admin-table tbody tr {
                display: block;
                padding: var(--space-3) var(--space-4);
                border-bottom: 1px solid var(--border-subtle);
                background: transparent;
            }
            .admin-table tbody tr:last-child {
                border-bottom: none;
            }
            .admin-table tbody tr.expanded {
                background: var(--primary-50);
            }
            .admin-table tbody tr.expand-row {
                margin-top: 0;
                padding: 0;
                border: none;
                border-bottom: 1px solid var(--border-subtle);
                border-radius: 0;
                overflow: hidden;
                box-shadow: none;
                background: var(--gray-50);
            }
            .admin-table tbody tr.expand-row:last-child {
                border-bottom: none;
            }
            .admin-table tbody tr:not(.expand-row) td {
                display: block;
                padding: var(--space-1) 0;
                border: none;
                min-width: 0;
                overflow-wrap: break-word;
                word-break: break-word;
            }
            .admin-table tbody tr:not(.expand-row) td:first-child { padding-top: 0; }
            .admin-table tbody tr:not(.expand-row) td:last-child { padding-bottom: 0; }
            .admin-table tbody tr:not(.expand-row) td:nth-child(1)::before { content: 'Email: '; }
            .admin-table tbody tr:not(.expand-row) td:nth-child(2)::before { content: 'Name: '; }
            .admin-table tbody tr:not(.expand-row) td:nth-child(3)::before { content: 'Joined: '; }
            .admin-table tbody tr:not(.expand-row) td:nth-child(4)::before { content: 'Groups: '; }
            .admin-table tbody tr:not(.expand-row) td::before {
                display: inline-block;
                font-weight: 600;
                font-size: var(--text-xs);
                color: var(--text-secondary);
                text-transform: uppercase;
                letter-spacing: 0.04em;
                min-width: 4.5em;
                margin-right: var(--space-2);
            }
            .admin-table tbody tr.expand-row td::before {
                content: none;
                display: none;
            }
            .admin-table .expand-cell {
                display: block;
                padding: 0;
            }
            .admin-table .expand-cell .inner {
                flex-direction: column;
                align-items: stretch;
                gap: 0;
                padding: var(--space-3) var(--space-4);
                min-width: 0;
                box-sizing: border-box;
                border-left: none;
                border-top: 1px solid var(--border);
                background: var(--gray-50);
            }
            .admin-table .expand-cell .inner .expand-detail-left {
                min-width: 0;
                order: 1;
                padding-bottom: var(--space-3);
            }
            .admin-table .expand-cell .inner .groups-empty {
                color: var(--text-tertiary);
                font-size: var(--text-sm);
            }
            .admin-table .expand-cell .inner .groups-list {
                margin: 0;
                padding-left: var(--space-4);
                list-style: disc;
            }
            .admin-table .expand-cell .inner .groups-list li {
                margin: var(--space-1) 0 0;
                line-height: 1.35;
            }
            .admin-table .expand-cell .inner .groups-list li:first-child {
                margin-top: 0;
            }
            .admin-table .expand-cell .inner .expand-actions {
                order: 2;
                width: 100%;
                padding-top: 0;
            }
            .admin-table .expand-cell .inner .btn-delete-user {
                width: 100%;
                justify-content: center;
                min-height: 44px;
                padding: var(--space-2) var(--space-4);
                font-size: var(--text-sm);
            }
            .admin-table tr .admin-empty-row {
                display: block;
                padding: var(--space-6) var(--space-4);
                text-align: center;
            }
            .admin-table tr .admin-empty-row::before { display: none; }
            .admin-signin-wrap { padding: var(--space-4); }
            .admin-signin-card { padding: var(--space-6) var(--space-4); }
        }
        @media (max-width: 480px) {
            .admin-header { padding: var(--space-2) var(--space-3); }
            .admin-header .back-link { padding: var(--space-1) var(--space-2); font-size: var(--text-xs); }
            .admin-main { padding: var(--space-3); }
            .admin-stat-value { font-size: var(--text-lg); }
            .admin-table tbody tr { padding: var(--space-2) var(--space-3); }
            .admin-table .expand-cell .inner { padding: var(--space-2) var(--space-3); }
            .admin-table .expand-cell .inner .expand-detail-left { padding-bottom: var(--space-2); }
            .admin-signin-card { padding: var(--space-5) var(--space-3); }
            .admin-signin-card h2 { font-size: var(--text-xl); }
        }

        .admin-header .sign-out-link {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            text-decoration: none;
        }
        .admin-header .sign-out-link:hover { color: var(--text-primary); }

        /* Admin loading screen – logo + spinner until ready */
        .admin-loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: linear-gradient(135deg, var(--gray-50) 0%, var(--background) 100%);
            z-index: 9999;
        }
        .admin-loading-screen.hidden {
            display: none;
        }
        .admin-loading-logo-wrap {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .admin-loading-logo-wrap img {
            height: 120px;
            width: auto;
            min-width: 100px;
            max-width: 220px;
            display: block;
            margin: 0 auto;
            object-fit: contain;
        }
        .admin-loading-logo-wrap img[data-fallback] {
            display: none;
        }
        .admin-loading-spinner {
            border: 3px solid var(--border);
            border-top-color: var(--primary-500);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: admin-spin 0.8s linear infinite;
        }
        .admin-loading-message {
            margin-top: 1.25rem;
            color: var(--text-tertiary);
            font-size: var(--text-sm);
            font-weight: 500;
        }
        @keyframes admin-spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="adminLoadingScreen" class="admin-loading-screen">
        <div class="admin-loading-logo-wrap">
            <img src="images/logo.png" alt="SplitXpense" onerror="this.style.display='none'; if(this.nextElementSibling) this.nextElementSibling.style.display='block';">
            <span style="display: none; font-size: 1.5rem; font-weight: 800; color: var(--primary-600);">SplitXpense</span>
        </div>
        <div class="admin-loading-spinner"></div>
        <p id="adminLoadingMessage" class="admin-loading-message">Loading…</p>
    </div>
    <div class="admin-page" id="adminPageContent" style="display: none;">
        <div class="admin-header">
            <h1>Admin</h1>
            <span id="adminHeaderLinks">
                <a href="index.html" id="adminBackLink" class="back-link">← Back to app</a>
            </span>
        </div>
        <div class="admin-main">
            <div id="adminContent"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/shared-supabase.js"></script>
    <script src="js/shared-sync.js"></script>
    <script>
        (function() {
            var content = document.getElementById('adminContent');

            function hideAdminLoading() {
                var loading = document.getElementById('adminLoadingScreen');
                var page = document.getElementById('adminPageContent');
                if (loading) loading.classList.add('hidden');
                if (page) page.style.display = 'flex';
            }

            function escapeHtml(s) {
                var div = document.createElement('div');
                div.textContent = s;
                return div.innerHTML;
            }

            var currentStats = null;
            var expandedIndex = -1;

            function formatDateShort(iso) {
                if (!iso) return '—';
                try {
                    var d = new Date(iso);
                    return isNaN(d.getTime()) ? iso : d.toLocaleDateString(undefined, { month: 'numeric', day: 'numeric', year: 'numeric' });
                } catch (e) { return iso; }
            }

            function render(stats) {
                currentStats = stats;
                var users = stats.users || [];
                var totalGroups = stats.totalGroups != null ? stats.totalGroups : 0;
                var totalExpenses = stats.totalExpenses != null ? stats.totalExpenses : 0;
                var html = '';
                html += '<div class="admin-stats">';
                html += '<div class="admin-stat"><div class="admin-stat-value">' + users.length + '</div><div class="admin-stat-label">Total users</div></div>';
                html += '<div class="admin-stat"><div class="admin-stat-value">' + totalGroups + '</div><div class="admin-stat-label">Total groups</div></div>';
                html += '<div class="admin-stat"><div class="admin-stat-value">' + totalExpenses + '</div><div class="admin-stat-label">Total expenses</div></div>';
                html += '</div>';
                html += '<div class="admin-table-wrap"><table class="admin-table"><thead><tr><th>Email</th><th>Name</th><th>Joined</th><th>Groups</th></tr></thead><tbody>';
                users.forEach(function(u, i) {
                    var id = (u.id != null) ? String(u.id) : '—';
                    var name = (u.name != null) ? String(u.name) : '—';
                    var created = u.created_at != null ? u.created_at : (u.createdAt != null ? u.createdAt : '');
                    var groups = u.groupCount != null ? u.groupCount : 0;
                    var rowClass = expandedIndex === i ? 'expanded' : '';
                    html += '<tr class="' + rowClass + '" data-user-index="' + i + '">';
                    html += '<td>' + escapeHtml(id) + '</td><td>' + escapeHtml(name) + '</td><td>' + formatDateShort(created) + '</td><td>' + groups + '</td></tr>';
                    if (expandedIndex === i) {
                        var groupNames = u.groupNames || [];
                        var trashSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>';
                        html += '<tr class="expand-row"><td colspan="4" class="expand-cell"><div class="inner">';
                        html += '<div class="expand-detail-left">';
                        if (groupNames.length === 0) html += '<span class="groups-empty">None</span>';
                        else html += '<ul class="groups-list">' + groupNames.map(function(n) { return '<li>' + escapeHtml(n) + '</li>'; }).join('') + '</ul>';
                        html += '</div>';
                        html += '<div class="expand-actions"><button type="button" class="btn-delete-user" data-user-index="' + i + '" title="Delete user" aria-label="Delete user">' + trashSvg + ' Delete</button></div>';
                        html += '</div></td></tr>';
                    }
                });
                if (users.length === 0) html += '<tr><td colspan="4" class="admin-empty-row"><span class="admin-empty-text">No users yet, or RLS is blocking admin read.</span></td></tr>';
                html += '</tbody></table></div>';
                content.innerHTML = html;
                document.querySelectorAll('.admin-table tbody tr:not(.expand-row)').forEach(function(el) {
                    if (el.classList.contains('expand-row')) return;
                    el.addEventListener('click', function() {
                        var idx = parseInt(el.getAttribute('data-user-index'), 10);
                        if (isNaN(idx)) return;
                        expandedIndex = expandedIndex === idx ? -1 : idx;
                        render(currentStats);
                    });
                });
                document.querySelectorAll('.btn-delete-user').forEach(function(btn) {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        var idx = parseInt(btn.getAttribute('data-user-index'), 10);
                        var u = currentStats && currentStats.users && currentStats.users[idx];
                        if (!u) {
                            console.warn('[Admin] Delete clicked but no user at index', idx);
                            return;
                        }
                        if (!confirm('Delete user "' + (u.name || u.id) + '"? This removes them from app data (users, groups, expenses). You can remove them from login in Supabase Dashboard → Authentication → Users. This cannot be undone.')) return;
                        var userId = (u.id != null) ? String(u.id) : '';
                        if (!userId) {
                            alert('Cannot delete: no user id.');
                            return;
                        }
                        console.log('[Admin] Delete confirmed for userId:', userId);
                        btn.disabled = true;
                        var deleteFn = typeof window.deleteUserInSupabase === 'function' ? window.deleteUserInSupabase : null;
                        if (!deleteFn) {
                            alert('Delete API not loaded. Check script order.');
                            btn.disabled = false;
                            return;
                        }
                        deleteFn(userId).then(function(result) {
                            btn.disabled = false;
                            if (result.ok) {
                                expandedIndex = -1;
                                content.innerHTML = '<p class="admin-msg">Refreshing list…</p>';
                                loadDashboard();
                            } else {
                                alert('Delete failed: ' + (result.error || 'Unknown error'));
                                if (result.error && result.error.indexOf('Sign in with Supabase') !== -1) showSignInPage();
                            }
                        }).catch(function(err) {
                            btn.disabled = false;
                            alert('Delete failed: ' + (err && err.message ? err.message : String(err)));
                        });
                    });
                });
            }

            var ALLOWED_ADMIN_EMAIL = 'saishilpha26@gmail.com';

            function showSignInPage() {
                hideAdminLoading();
                var linksEl = document.getElementById('adminHeaderLinks');
                if (linksEl) {
                    linksEl.innerHTML = '<a href="index.html" class="back-link">← Back to app</a>';
                }
                content.innerHTML = '<div class="admin-signin-wrap">' +
                    '<div class="admin-signin-card">' +
                    '<h2>Admin sign in</h2>' +
                    '<p class="admin-signin-subtitle">Sign in with your admin email and password to manage users and data.</p>' +
                    '<form id="adminSignInForm">' +
                    '<div class="admin-field">' +
                    '<label for="adminEmail">Email</label>' +
                    '<input type="email" id="adminEmail" class="admin-input" placeholder="you@example.com" autocomplete="email" value="' + escapeHtml(ALLOWED_ADMIN_EMAIL) + '">' +
                    '</div>' +
                    '<div class="admin-field">' +
                    '<label for="adminPassword">Password</label>' +
                    '<div class="admin-password-wrap">' +
                    '<input type="password" id="adminPassword" placeholder="Enter password" autocomplete="current-password">' +
                    '<button type="button" class="admin-toggle-pw" id="adminTogglePw" aria-label="Show password" title="Show password">' +
                    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>' +
                    '</button></div>' +
                    '</div>' +
                    '<button type="submit" class="btn-signin" id="adminSignInBtn">Sign in</button>' +
                    '<p id="adminSignInStatus" class="admin-signin-status"></p>' +
                    '</form></div></div>';
                document.getElementById('adminSignInForm').addEventListener('submit', function(e) {
                    e.preventDefault();
                    var emailEl = document.getElementById('adminEmail');
                    var pwEl = document.getElementById('adminPassword');
                    var statusEl = document.getElementById('adminSignInStatus');
                    var btn = document.getElementById('adminSignInBtn');
                    var email = (emailEl && emailEl.value) ? emailEl.value.trim().toLowerCase() : '';
                    var pw = (pwEl && pwEl.value) ? pwEl.value : '';
                    if (!email) { statusEl.textContent = 'Enter your email.'; statusEl.className = 'admin-signin-status error'; return; }
                    if (!pw) { statusEl.textContent = 'Enter your password.'; statusEl.className = 'admin-signin-status error'; return; }
                    statusEl.textContent = '';
                    statusEl.className = 'admin-signin-status';
                    if (btn) { btn.disabled = true; btn.textContent = 'Signing in…'; }
                    var signIn = typeof window.authSignIn === 'function' ? window.authSignIn : null;
                    if (!signIn) {
                        statusEl.textContent = 'Auth not loaded.';
                        statusEl.className = 'admin-signin-status error';
                        if (btn) { btn.disabled = false; btn.textContent = 'Sign in'; }
                        return;
                    }
                    signIn(email, pw).then(function(res) {
                        if (res && res.error) {
                            statusEl.textContent = res.error.message || 'Sign in failed.';
                            statusEl.className = 'admin-signin-status error';
                            if (btn) { btn.disabled = false; btn.textContent = 'Sign in'; }
                            return;
                        }
                        if (email !== ALLOWED_ADMIN_EMAIL) {
                            statusEl.textContent = 'Only the admin email can access this page.';
                            statusEl.className = 'admin-signin-status error';
                            if (typeof window.authSignOut === 'function') window.authSignOut();
                            if (btn) { btn.disabled = false; btn.textContent = 'Sign in'; }
                            return;
                        }
                        statusEl.textContent = 'Signed in.';
                        statusEl.className = 'admin-signin-status success';
                        showDashboard();
                    }).catch(function(err) {
                        statusEl.textContent = (err && err.message) ? err.message : 'Sign in failed.';
                        statusEl.className = 'admin-signin-status error';
                        if (btn) { btn.disabled = false; btn.textContent = 'Sign in'; }
                    });
                });
                var pwInput = document.getElementById('adminPassword');
                var toggleBtn = document.getElementById('adminTogglePw');
                if (pwInput && toggleBtn) {
                    var eyeSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
                    var eyeOffSvg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
                    toggleBtn.addEventListener('click', function() {
                        if (pwInput.type === 'password') {
                            pwInput.type = 'text';
                            toggleBtn.innerHTML = eyeOffSvg;
                            toggleBtn.setAttribute('aria-label', 'Hide password');
                            toggleBtn.title = 'Hide password';
                        } else {
                            pwInput.type = 'password';
                            toggleBtn.innerHTML = eyeSvg;
                            toggleBtn.setAttribute('aria-label', 'Show password');
                            toggleBtn.title = 'Show password';
                        }
                    });
                }
            }

            function showDashboard() {
                hideAdminLoading();
                var linksEl = document.getElementById('adminHeaderLinks');
                if (linksEl) {
                    linksEl.innerHTML = '<a href="index.html" class="back-link">← Back to app</a> <span style="color:var(--border);margin:0 0.5rem;">|</span> <a href="#" id="adminSignOutLink" class="sign-out-link">Sign out</a>';
                    var signOutLink = document.getElementById('adminSignOutLink');
                    if (signOutLink) {
                        signOutLink.addEventListener('click', function(e) {
                            e.preventDefault();
                            if (typeof window.authSignOut === 'function') window.authSignOut();
                            showSignInPage();
                        });
                    }
                }
                loadDashboard();
            }

            function run() {
                if (typeof window.initializeSupabase !== 'function') {
                    hideAdminLoading();
                    content.innerHTML = '<p class="admin-msg admin-error">Supabase not loaded.</p>';
                    return;
                }
                window.initializeSupabase();
                if (typeof window.getAuthSession !== 'function') {
                    showSignInPage();
                    return;
                }
                window.getAuthSession().then(function(s) {
                    var session = s && s.data && s.data.session;
                    var email = session && session.user && session.user.email ? String(session.user.email).toLowerCase().trim() : '';
                    if (session && email === ALLOWED_ADMIN_EMAIL) {
                        showDashboard();
                    } else {
                        showSignInPage();
                    }
                }).catch(function() {
                    showSignInPage();
                });
            }

            function loadDashboard() {
                if (typeof window.fetchAdminStats !== 'function') {
                    content.innerHTML = '<p class="admin-msg admin-error">Admin API not loaded. Check script order.</p>';
                    return;
                }
                window.fetchAdminStats().then(function(stats) {
                    render(stats);
                }).catch(function(err) {
                    content.innerHTML = '<p class="admin-msg admin-error">Failed to load stats: ' + escapeHtml(err && err.message ? err.message : String(err)) + '</p>';
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() { setTimeout(run, 300); });
            } else {
                setTimeout(run, 300);
            }
        })();
    </script>
</body>
</html>
